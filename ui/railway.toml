# Railway: use when this service root is the `ui/` directory (see docs/railway.md).
# Set service variable NEXT_PUBLIC_API_URL to your *public* API URL before build.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
